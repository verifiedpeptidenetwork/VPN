<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VPN Verified Peptides Network | Access</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --neon-pink: #ff2d78;
    --neon-cyan: #00f5ff;
    --neon-purple: #ffe600;
    --neon-orange: #ff6b00;
    --dark-bg: #050012;
    --card-bg: #0e0625;
    --card-border: #1a0a35;
    --mid-bg: #0c0320;
    --text-primary: #ffffff;
    --text-secondary: #e8e0f0;
    --grid-color: rgba(0,245,255,0.04);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%;
    height: 100%;
    min-height: 100vh;
    background: var(--dark-bg);
    color: var(--text-primary);
    font-family: 'Rajdhani', sans-serif;
    overflow-x: hidden;
  }

  body {
    background: linear-gradient(180deg, #1a0a3a 0%, #3a1255 22%, #6b1d63 40%, #b8324f 58%, #ff6b35 74%, #ffb347 88%, #ffd97a 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1.5rem;
    position: relative;
    overflow: hidden;
  }

  /* Sun */
  body::before {
    content: '';
    position: fixed;
    left: 50%;
    bottom: 8%;
    width: 480px;
    height: 480px;
    transform: translateX(-50%);
    border-radius: 50%;
    background: linear-gradient(180deg, #fff6c8 0%, #ffd34d 25%, #ff9a3c 55%, #ff5a7a 85%, #ff2d78 100%);
    box-shadow: 0 0 120px rgba(255,150,80,0.7), 0 0 240px rgba(255,80,120,0.4);
    pointer-events: none;
    z-index: 0;
  }

  /* Sun scanlines */
  body::after {
    content: '';
    position: fixed;
    left: 50%;
    bottom: 8%;
    width: 480px;
    height: 480px;
    transform: translateX(-50%);
    border-radius: 50%;
    background: repeating-linear-gradient(
      to bottom,
      transparent 0px, transparent 14px,
      #b8324f 14px, #b8324f 22px
    );
    -webkit-mask: radial-gradient(circle, #fff 60%, transparent 60%);
    mask: radial-gradient(circle, #fff 60%, transparent 60%);
    mask-mode: alpha;
    opacity: 0.55;
    pointer-events: none;
    z-index: 0;
  }

  /* Retro grid floor */
  .grid-floor {
    position: fixed;
    left: 0; right: 0; bottom: 0;
    height: 45%;
    background:
      linear-gradient(0deg, rgba(20,5,40,0.9), rgba(20,5,40,0));
    z-index: 1;
    pointer-events: none;
    overflow: hidden;
  }
  .grid-floor::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      repeating-linear-gradient(90deg, rgba(0,245,255,0.5) 0 2px, transparent 2px 60px),
      repeating-linear-gradient(0deg, rgba(0,245,255,0.35) 0 2px, transparent 2px 34px);
    background-size: 60px 100%, 100% 34px;
    transform: perspective(220px) rotateX(70deg);
    transform-origin: bottom;
    opacity: 0.5;
  }

  /* Palm silhouettes */
  .palm {
    position: fixed;
    bottom: 0;
    width: 220px;
    height: 320px;
    z-index: 2;
    pointer-events: none;
    opacity: 0.85;
    filter: drop-shadow(0 0 25px rgba(0,0,0,0.4));
  }
  .palm.left { left: -30px; }
  .palm.right { right: -30px; transform: scaleX(-1); }
  @media (max-width: 700px) {
    .palm { width: 130px; height: 200px; opacity: 0.5; }
  }

  /* Stars */
  .stars {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    background-image:
      radial-gradient(2px 2px at 10% 15%, #fff, transparent),
      radial-gradient(2px 2px at 25% 8%, #fff, transparent),
      radial-gradient(1.5px 1.5px at 40% 20%, #fff, transparent),
      radial-gradient(2px 2px at 60% 5%, #fff, transparent),
      radial-gradient(1.5px 1.5px at 75% 15%, #fff, transparent),
      radial-gradient(2px 2px at 90% 10%, #fff, transparent),
      radial-gradient(1.5px 1.5px at 50% 25%, #fff, transparent);
    opacity: 0.7;
  }

  .panel {
    position: relative;
    z-index: 5;
    width: 100%;
    max-width: 440px;
    background: rgba(14, 6, 37, 0.78);
    backdrop-filter: blur(14px);
    border: 2px solid var(--card-border);
    border-radius: 18px;
    padding: 2.5rem 2rem;
    text-align: center;
    box-shadow: 0 0 0 1px rgba(0,245,255,0.08), 0 0 60px rgba(255,80,120,0.25), 0 25px 70px rgba(0,0,0,0.7);
  }

  .panel::before {
    content: '';
    position: absolute;
    top: -2px; left: -2px; right: -2px; bottom: -2px;
    border-radius: 18px;
    border: 2px solid transparent;
    background: linear-gradient(135deg, var(--neon-pink), var(--neon-cyan), var(--neon-purple), var(--neon-orange), var(--neon-pink));
    background-size: 300% 300%;
    -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
    z-index: -1;
    opacity: 0.7;
    animation: borderflow 6s linear infinite;
  }

  @keyframes borderflow {
    0% { background-position: 0% 50%; }
    100% { background-position: 200% 50%; }
  }

  .logo-ring {
    width: 160px;
    height: 160px;
    margin: 0 auto 1.25rem;
    border-radius: 50%;
    border: 4px solid var(--neon-cyan);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2.5rem;
    box-shadow: 0 0 25px rgba(0,245,255,0.6), 0 0 60px rgba(255,107,0,0.35), inset 0 0 25px rgba(0,245,255,0.2);
    animation: spin 16s linear infinite;
  }
  @media (max-width: 480px) {
    .logo-ring { width: 120px; height: 120px; }
  }

  @keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  .logo-ring span { display:inline-block; animation: unspin 12s linear infinite; }
  @keyframes unspin {
    from { transform: rotate(0deg); }
    to { transform: rotate(-360deg); }
  }

  h1 {
    font-family: 'Bebas Neue', sans-serif;
    letter-spacing: 0.3em;
    font-size: 1.5rem;
    color: var(--neon-cyan);
    text-shadow: 0 0 8px var(--neon-cyan), 0 0 20px rgba(0,245,255,0.4);
    margin-bottom: 0.4rem;
  }

  .sub {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.8rem;
    color: var(--neon-pink);
    letter-spacing: 0.15em;
    text-shadow: 0 0 8px var(--neon-pink);
    margin-bottom: 1.75rem;
  }

  .auth-fields {
    display: flex;
    flex-direction: column;
    gap: 0.85rem;
    margin-bottom: 1.25rem;
  }

  .auth-fields input {
    width: 100%;
    padding: 0.9rem 1rem;
    text-align: left;
    font-size: 1rem;
    font-family: 'Rajdhani', sans-serif;
    font-weight: 600;
    color: var(--text-primary);
    background: var(--mid-bg);
    border: 2px solid var(--card-border);
    border-radius: 8px;
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
  }

  .auth-fields input:focus {
    border-color: var(--neon-cyan);
    box-shadow: 0 0 12px rgba(0,245,255,0.5);
  }

  .toggle-row {
    margin-top: 1.25rem;
    font-family: 'Rajdhani', sans-serif;
    font-weight: 600;
    font-size: 0.85rem;
    color: var(--text-secondary);
  }

  .toggle-row a, .forgot-link {
    color: var(--neon-cyan);
    text-decoration: none;
    cursor: pointer;
  }

  .toggle-row a:hover, .forgot-link:hover {
    text-decoration: underline;
  }

  .forgot-row {
    text-align: right;
    margin-top: -0.4rem;
    margin-bottom: 0.5rem;
    font-family: 'Rajdhani', sans-serif;
    font-weight: 600;
    font-size: 0.8rem;
  }

  .success-msg {
    margin-top: 1rem;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.8rem;
    color: #00ff64;
    letter-spacing: 0.05em;
    min-height: 1.2em;
    text-shadow: 0 0 6px #00ff64;
    opacity: 0;
    transition: opacity 0.2s;
  }

  .success-msg.show { opacity: 1; }

  .enter-btn {
    width: 100%;
    padding: 0.95rem;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.1rem;
    letter-spacing: 0.25em;
    color: var(--dark-bg);
    background: var(--neon-cyan);
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: transform 0.1s, box-shadow 0.2s;
    box-shadow: 0 0 20px rgba(0,245,255,0.5);
  }

  .enter-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 0 30px rgba(0,245,255,0.8);
  }

  .enter-btn:active { transform: translateY(0); }

  .error-msg {
    margin-top: 1rem;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.8rem;
    color: var(--neon-orange);
    letter-spacing: 0.1em;
    min-height: 1.2em;
    text-shadow: 0 0 6px var(--neon-orange);
    opacity: 0;
    transition: opacity 0.2s;
  }

  .error-msg.show { opacity: 1; }

  .shake { animation: shake 0.4s; }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20%, 60% { transform: translateX(-8px); }
    40%, 80% { transform: translateX(8px); }
  }

  .footer-note {
    margin-top: 1.75rem;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    color: rgba(232,224,240,0.4);
  }

  .members-note {
    margin-top: 1.5rem;
    font-family: 'Rajdhani', sans-serif;
    font-weight: 600;
    font-size: 0.85rem;
    letter-spacing: 0.08em;
    color: var(--text-secondary);
  }

  .members-note span {
    color: var(--neon-purple);
  }

  .skool-btn {
    display: block;
    width: 100%;
    margin-top: 0.85rem;
    padding: 0.85rem;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1rem;
    letter-spacing: 0.2em;
    color: var(--dark-bg);
    background: var(--neon-purple);
    border: none;
    border-radius: 8px;
    text-decoration: none;
    cursor: pointer;
    transition: transform 0.1s, box-shadow 0.2s;
    box-shadow: 0 0 20px rgba(255,230,0,0.4);
  }

  .skool-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 0 30px rgba(255,230,0,0.7);
  }

  .popup-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }

  .popup-overlay.show {
    opacity: 1;
    pointer-events: auto;
  }

  .popup-box {
    position: relative;
    max-width: 340px;
    width: 90%;
    background: var(--card-bg);
    border: 2px solid var(--neon-orange);
    border-radius: 12px;
    padding: 2rem 1.5rem 1.5rem;
    text-align: center;
    box-shadow: 0 0 30px rgba(255,107,0,0.4);
    transform: scale(0.85);
    transition: transform 0.2s;
  }

  .popup-overlay.show .popup-box {
    transform: scale(1);
  }

  .popup-close {
    position: absolute;
    top: 8px;
    right: 10px;
    background: none;
    border: none;
    color: var(--text-secondary);
    font-size: 1.4rem;
    line-height: 1;
    cursor: pointer;
    padding: 0.2rem 0.4rem;
  }

  .popup-close:hover {
    color: var(--neon-orange);
  }

  .popup-icon {
    font-size: 2.5rem;
    margin-bottom: 0.75rem;
  }

  .popup-msg {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.1rem;
    letter-spacing: 0.1em;
    color: var(--neon-orange);
    text-shadow: 0 0 8px var(--neon-orange);
    line-height: 1.5;
  }
</style>
</head>
<body>

<div class="stars"></div>
<div class="grid-floor"></div>

<svg class="palm left" viewBox="0 0 200 300" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMinYMax meet">
  <rect x="92" y="120" width="14" height="180" fill="#1a0a35"/>

  <rect x="92" y="120" width="14" height="180" fill="#1a0a35"/>
  <path d="M99 130 Q40 90 10 60" stroke="#1a0a35" stroke-width="12" fill="none" stroke-linecap="round"/>

  <path d="M99 125 Q60 60 30 30" stroke="#1a0a35" stroke-width="12" fill="none" stroke-linecap="round"/>
  <path d="M99 125 Q150 55 185 35" stroke="#1a0a35" stroke-width="12" fill="none" stroke-linecap="round"/>
  <path d="M99 122 Q105 50 100 10" stroke="#1a0a35" stroke-width="12" fill="none" stroke-linecap="round"/>
</svg>

<div class="panel">
  <div class="logo-ring"><img src="gorilla-icon.png" alt="VPN" style="width:100%;height:100%;object-fit:cover;border-radius:50%;"></div>
  <h1>VPN ACCESS</h1>
  <div class="sub" id="mode-sub">SIGN IN TO YOUR ACCOUNT</div>

  <form id="auth-form" autocomplete="on">
    <div class="auth-fields">
      <input type="email" id="email" placeholder="Email address" autocomplete="email" required>
      <input type="password" id="password" placeholder="Password" autocomplete="current-password" required>
    </div>
    <div class="forgot-row"><a class="forgot-link" id="forgot-link">Forgot password?</a></div>
    <button type="submit" class="enter-btn" id="submit-btn">SIGN IN</button>
    <div class="error-msg" id="error-msg"></div>
    <div class="success-msg" id="success-msg"></div>
  </form>

  <div class="toggle-row" id="toggle-row">
    Don't have an account? <a id="toggle-mode">Create one</a>
  </div>

  <div class="footer-note">VERIFIED PEPTIDES NETWORK — RESTRICTED ACCESS</div>

  <div class="members-note">
    This is for <span>RUIC group members only</span>.<br>
    Not a member yet? Join the Skool first.
  </div>
  <a class="skool-btn" href="https://www.skool.com/retaunfiltered" target="_blank" rel="noopener">JOIN THE SKOOL</a>
</div>

<div class="popup-overlay" id="popup-overlay">
  <div class="popup-box">
    <button class="popup-close" id="popup-close" aria-label="Close">✕</button>
    <div class="popup-icon">⚠️</div>
    <div class="popup-msg" id="popup-msg"></div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import {
    getAuth, onAuthStateChanged, signInWithEmailAndPassword,
    createUserWithEmailAndPassword, sendPasswordResetEmail, setPersistence, browserLocalPersistence
  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBu2sWo0V3wL12-g7tafRnlXtIz2WtRW20",
    authDomain: "vpnhub-data.firebaseapp.com",
    projectId: "vpnhub-data",
    storageBucket: "vpnhub-data.firebasestorage.app",
    messagingSenderId: "519239456167",
    appId: "1:519239456167:web:2ee7f62c48e17f07c75282"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  setPersistence(auth, browserLocalPersistence);

  var form = document.getElementById('auth-form');
  var emailInput = document.getElementById('email');
  var passwordInput = document.getElementById('password');
  var errorMsg = document.getElementById('error-msg');
  var successMsg = document.getElementById('success-msg');
  var panel = document.querySelector('.panel');
  var submitBtn = document.getElementById('submit-btn');
  var modeSub = document.getElementById('mode-sub');
  var toggleRow = document.getElementById('toggle-row');
  var toggleMode = document.getElementById('toggle-mode');
  var forgotLink = document.getElementById('forgot-link');

  var isSignUp = false;

  // If already signed in, skip straight to home
  onAuthStateChanged(auth, function(user){
    if (user) {
      window.location.href = 'home.html';
    }
  });

  toggleRow.addEventListener('click', function(e){
    if (e.target && e.target.id === 'toggle-mode') {
      isSignUp = !isSignUp;
      clearMsgs();
      if (isSignUp) {
        modeSub.textContent = 'CREATE YOUR ACCOUNT';
        submitBtn.textContent = 'CREATE ACCOUNT';
        toggleRow.innerHTML = 'Already have an account? <a id="toggle-mode">Sign in</a>';
      } else {
        modeSub.textContent = 'SIGN IN TO YOUR ACCOUNT';
        submitBtn.textContent = 'SIGN IN';
        toggleRow.innerHTML = "Don't have an account? <a id=\"toggle-mode\">Create one</a>";
      }
    }
  });

  forgotLink.addEventListener('click', function(){
    var email = emailInput.value.trim();
    if (!email) {
      showError('ENTER YOUR EMAIL FIRST, THEN CLICK FORGOT PASSWORD');
      return;
    }
    sendPasswordResetEmail(auth, email).then(function(){
      showSuccess('PASSWORD RESET EMAIL SENT — CHECK YOUR INBOX');
    }).catch(function(err){
      showError(friendlyError(err));
    });
  });

  form.addEventListener('submit', function(e){
    e.preventDefault();
    clearMsgs();
    var email = emailInput.value.trim();
    var password = passwordInput.value;

    if (!email || !password) {
      showError('ENTER YOUR EMAIL AND PASSWORD');
      return;
    }
    if (password.length < 6) {
      showError('PASSWORD MUST BE AT LEAST 6 CHARACTERS');
      return;
    }

    if (isSignUp) {
      createUserWithEmailAndPassword(auth, email, password).then(function(){
        window.location.href = 'home.html';
      }).catch(function(err){
        showError(friendlyError(err));
      });
    } else {
      signInWithEmailAndPassword(auth, email, password).then(function(){
        window.location.href = 'home.html';
      }).catch(function(err){
        showError(friendlyError(err));
      });
    }
  });

  function friendlyError(err){
    var code = err && err.code ? err.code : '';
    if (code === 'auth/email-already-in-use') return 'AN ACCOUNT WITH THAT EMAIL ALREADY EXISTS — SIGN IN INSTEAD';
    if (code === 'auth/invalid-email') return 'THAT EMAIL ADDRESS LOOKS INVALID';
    if (code === 'auth/user-not-found') return 'NO ACCOUNT FOUND — CREATE ONE BELOW';
    if (code === 'auth/wrong-password' || code === 'auth/invalid-credential') return 'WRONG EMAIL OR PASSWORD';
    if (code === 'auth/weak-password') return 'PASSWORD MUST BE AT LEAST 6 CHARACTERS';
    if (code === 'auth/too-many-requests') return 'TOO MANY ATTEMPTS — TRY AGAIN LATER';
    return 'SOMETHING WENT WRONG — TRY AGAIN';
  }

  function showError(msg){
    successMsg.classList.remove('show');
    errorMsg.textContent = msg;
    errorMsg.classList.add('show');
    panel.classList.remove('shake');
    requestAnimationFrame(function(){ panel.classList.add('shake'); });
  }

  function showSuccess(msg){
    errorMsg.classList.remove('show');
    successMsg.textContent = msg;
    successMsg.classList.add('show');
  }

  function clearMsgs(){
    errorMsg.classList.remove('show');
    successMsg.classList.remove('show');
  }
</script>

</body>
